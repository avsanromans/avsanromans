<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7c4a"/>
      <stop offset="100%" stop-color="#3d5c2e"/>
    </linearGradient>
    <linearGradient id="warmLight" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f5d078" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e8a840" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f5d078" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f5d078" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#sky1)"/>
  <!-- Mountains -->
  <path d="M0 180 Q50 140 100 160 Q150 130 200 150 Q250 120 300 145 Q350 125 400 155 L400 300 L0 300Z" fill="#2d4a20" opacity="0.5"/>
  <!-- Ground -->
  <path d="M0 220 Q100 210 200 215 Q300 220 400 210 L400 300 L0 300Z" fill="#4a6b38"/>
  <path d="M0 240 Q100 235 200 238 Q300 242 400 236 L400 300 L0 300Z" fill="#3d5c2e"/>
  <!-- Trees background -->
  <circle cx="60" cy="185" r="25" fill="#2d4a20" opacity="0.7"/>
  <circle cx="80" cy="180" r="20" fill="#365828" opacity="0.7"/>
  <circle cx="330" cy="178" r="22" fill="#2d4a20" opacity="0.7"/>
  <circle cx="355" cy="183" r="18" fill="#365828" opacity="0.7"/>
  <!-- Stone building -->
  <rect x="130" y="155" width="140" height="90" rx="2" fill="#8c7d6d"/>
  <rect x="132" y="157" width="136" height="86" rx="1" fill="#a08d7a"/>
  <!-- Stone texture lines -->
  <line x1="132" y1="175" x2="268" y2="175" stroke="#8c7d6d" stroke-width="0.8"/>
  <line x1="132" y1="195" x2="268" y2="195" stroke="#8c7d6d" stroke-width="0.8"/>
  <line x1="132" y1="215" x2="268" y2="215" stroke="#8c7d6d" stroke-width="0.8"/>
  <line x1="170" y1="157" x2="170" y2="175" stroke="#8c7d6d" stroke-width="0.6"/>
  <line x1="220" y1="157" x2="220" y2="175" stroke="#8c7d6d" stroke-width="0.6"/>
  <line x1="195" y1="175" x2="195" y2="195" stroke="#8c7d6d" stroke-width="0.6"/>
  <line x1="155" y1="195" x2="155" y2="215" stroke="#8c7d6d" stroke-width="0.6"/>
  <line x1="240" y1="195" x2="240" y2="215" stroke="#8c7d6d" stroke-width="0.6"/>
  <!-- Roof (slate) -->
  <polygon points="120,155 200,110 280,155" fill="#4a4a4a"/>
  <polygon points="125,155 200,115 275,155" fill="#5a5a5a"/>
  <!-- Door with warm light -->
  <rect x="180" y="200" width="40" height="45" rx="1" fill="url(#warmLight)"/>
  <circle cx="200" cy="200" r="40" fill="url(#glow)"/>
  <!-- Windows with warm glow -->
  <rect x="145" y="170" width="22" height="18" rx="1" fill="#f5d078" opacity="0.7"/>
  <rect x="233" y="170" width="22" height="18" rx="1" fill="#f5d078" opacity="0.7"/>
  <line x1="156" y1="170" x2="156" y2="188" stroke="#a08d7a" stroke-width="1.5"/>
  <line x1="244" y1="170" x2="244" y2="188" stroke="#a08d7a" stroke-width="1.5"/>
  <!-- Window cross bars -->
  <line x1="145" y1="179" x2="167" y2="179" stroke="#a08d7a" stroke-width="1"/>
  <line x1="233" y1="179" x2="255" y2="179" stroke="#a08d7a" stroke-width="1"/>
  <!-- Chimney -->
  <rect x="230" y="105" width="16" height="30" fill="#706050"/>
  <!-- Smoke -->
  <circle cx="238" cy="95" r="5" fill="#c0c0c0" opacity="0.3"/>
  <circle cx="242" cy="85" r="6" fill="#c0c0c0" opacity="0.2"/>
  <circle cx="237" cy="74" r="7" fill="#c0c0c0" opacity="0.1"/>
  <!-- Path to door -->
  <path d="M190 245 Q195 250 200 270 Q205 285 195 300" stroke="#6b5e4f" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Small details: flower pots -->
  <rect x="142" y="189" width="8" height="6" rx="1" fill="#8B4513" opacity="0.6"/>
  <circle cx="146" cy="187" r="3" fill="#4a6b38" opacity="0.7"/>
  <rect x="250" y="189" width="8" height="6" rx="1" fill="#8B4513" opacity="0.6"/>
  <circle cx="254" cy="187" r="3" fill="#4a6b38" opacity="0.7"/>
</svg>
