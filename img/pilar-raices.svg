<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4a2a"/>
      <stop offset="100%" stop-color="#4a3520"/>
    </linearGradient>
  </defs>
  <!-- Warm evening background -->
  <rect width="400" height="300" fill="url(#sky3)"/>
  <!-- Ground -->
  <path d="M0 210 Q100 200 200 205 Q300 210 400 200 L400 300 L0 300Z" fill="#3d5c2e"/>
  <path d="M0 235 Q100 230 200 233 Q300 237 400 230 L400 300 L0 300Z" fill="#2d4a20"/>
  <!-- Church silhouette in background -->
  <rect x="280" y="145" width="50" height="65" fill="#3a2a1a" opacity="0.5"/>
  <polygon points="290,145 305,110 320,145" fill="#3a2a1a" opacity="0.5"/>
  <rect x="301" y="100" width="8" height="15" fill="#3a2a1a" opacity="0.5"/>
  <!-- Bonfire / gathering -->
  <ellipse cx="200" cy="255" rx="30" ry="8" fill="#2a1a0a" opacity="0.3"/>
  <!-- Fire -->
  <path d="M195 255 Q190 235 200 220 Q205 230 210 255Z" fill="#e8a840" opacity="0.8"/>
  <path d="M198 255 Q194 240 200 228 Q204 238 206 255Z" fill="#f5d078" opacity="0.9"/>
  <path d="M196 250 Q193 242 198 232 Q202 240 204 250Z" fill="#fff3c4" opacity="0.6"/>
  <!-- Sparks -->
  <circle cx="195" cy="215" r="1.5" fill="#f5d078" opacity="0.7"/>
  <circle cx="208" cy="210" r="1" fill="#f5d078" opacity="0.5"/>
  <circle cx="192" cy="205" r="1" fill="#e8a840" opacity="0.4"/>
  <!-- Dancing couple left -->
  <circle cx="135" cy="210" r="8" fill="#c9b88c"/>
  <path d="M127 220 Q130 235 135 245" stroke="#c9563a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M135 228 L145 222" stroke="#c9563a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="155" cy="212" r="8" fill="#c9b88c"/>
  <path d="M163 222 Q160 237 155 247" stroke="#4a6b38" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M155 230 L145 224" stroke="#4a6b38" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Dancing couple right -->
  <circle cx="250" cy="212" r="8" fill="#c9b88c"/>
  <path d="M242 222 Q245 237 250 247" stroke="#4a3728" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M250 230 L240 225" stroke="#4a3728" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="270" cy="210" r="8" fill="#c9b88c"/>
  <path d="M278 220 Q275 235 270 245" stroke="#6b5744" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M270 228 L260 223" stroke="#6b5744" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Musician with drum/gaita on right -->
  <circle cx="345" cy="205" r="8" fill="#c9b88c"/>
  <path d="M337 215 Q340 235 345 248" stroke="#4a3728" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Gaita/instrument suggestion -->
  <path d="M345 225 L360 218 L365 222" stroke="#8c7d6d" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="340" cy="228" rx="6" ry="8" fill="#8c7d6d" opacity="0.6"/>
  <!-- Musical notes -->
  <text x="355" y="200" font-size="14" fill="#f5d078" opacity="0.7" font-family="serif">♪</text>
  <text x="365" y="190" font-size="12" fill="#f5d078" opacity="0.5" font-family="serif">♫</text>
  <text x="130" y="198" font-size="11" fill="#f5d078" opacity="0.5" font-family="serif">♪</text>
  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="#f5d078" opacity="0.6"/>
  <circle cx="120" cy="60" r="1" fill="#f5d078" opacity="0.4"/>
  <circle cx="200" cy="30" r="1.5" fill="#f5d078" opacity="0.5"/>
  <circle cx="280" cy="50" r="1" fill="#f5d078" opacity="0.4"/>
  <circle cx="350" cy="35" r="1.5" fill="#f5d078" opacity="0.6"/>
  <circle cx="380" cy="70" r="1" fill="#f5d078" opacity="0.3"/>
  <circle cx="30" cy="80" r="1" fill="#f5d078" opacity="0.3"/>
  <!-- Moon -->
  <circle cx="60" cy="50" r="18" fill="#f5e6b0" opacity="0.15"/>
  <circle cx="55" cy="45" r="15" fill="#f5e6b0" opacity="0.1"/>
</svg>
