  <rect x="295" y="176" width="20" height="12" fill="#6b5e4f" opacity="0.5"/>
  <polygon points="293,176 305,165 318,176" fill="#4a4a4a" opacity="0.5"/>
  <!-- Central: hands planting a young tree -->
