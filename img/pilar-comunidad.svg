<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7c4a"/>
      <stop offset="60%" stop-color="#4a6b38"/>
      <stop offset="100%" stop-color="#3d5c2e"/>
    </linearGradient>
    <linearGradient id="sunGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f5d078" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5d078" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Morning sky -->
  <rect width="400" height="300" fill="url(#sky4)"/>
  <!-- Sun rising -->
  <circle cx="200" cy="180" r="80" fill="url(#sunGlow)"/>
  <circle cx="200" cy="180" r="25" fill="#f5e6b0" opacity="0.3"/>
  <circle cx="200" cy="180" r="15" fill="#f5e6b0" opacity="0.2"/>
  <!-- Hills -->
  <path d="M0 190 Q60 165 120 178 Q180 155 240 172 Q300 150 360 170 Q380 165 400 175 L400 300 L0 300Z" fill="#4a6b38"/>
  <path d="M0 220 Q100 210 200 215 Q300 220 400 210 L400 300 L0 300Z" fill="#3d5c2e"/>
  <!-- Village rooftops in distance -->
  <rect x="90" y="178" width="18" height="14" fill="#6b5e4f" opacity="0.5"/>
  <polygon points="88,178 99,168 110,178" fill="#4a4a4a" opacity="0.5"/>
  <rect x="115" y="175" width="15" height="17" fill="#6b5e4f" opacity="0.5"/>
  <polygon points="113,175 123,166 133,175" fill="#4a4a4a" opacity="0.5"/>
  <rect x="270" y="172" width="16" height="16" fill="#6b5e4f" opacity="0.5"/>
