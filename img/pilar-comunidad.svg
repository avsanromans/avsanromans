  <line x1="200" y1="155" x2="200" y2="140" stroke="#f5e6b0" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="215" y1="158" x2="225" y2="145" stroke="#f5e6b0" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="185" y1="158" x2="175" y2="145" stroke="#f5e6b0" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
