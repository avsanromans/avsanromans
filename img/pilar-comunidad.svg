  <rect x="196" y="210" width="8" height="35" rx="2" fill="#5a4a38"/>
  <!-- Branches -->
  <path d="M200 225 Q185 210 178 200" stroke="#5a4a38" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M200 225 Q215 208 222 198" stroke="#5a4a38" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M200 215 Q190 205 185 195" stroke="#5a4a38" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M200 218 Q212 205 218 195" stroke="#5a4a38" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <circle cx="178" cy="198" r="10" fill="#4a8c2a" opacity="0.8"/>
  <circle cx="185" cy="192" r="8" fill="#5aa035" opacity="0.7"/>
  <circle cx="222" cy="196" r="10" fill="#4a8c2a" opacity="0.8"/>
  <circle cx="218" cy="190" r="9" fill="#5aa035" opacity="0.7"/>
  <circle cx="200" cy="205" r="10" fill="#3d7317" opacity="0.7"/>
  <circle cx="193" cy="200" r="7" fill="#5aa035" opacity="0.6"/>
  <circle cx="210" cy="200" r="7" fill="#5aa035" opacity="0.6"/>
  <!-- Hands planting (two pairs from sides) -->
  <!-- Left hand -->
  <path d="M155 255 Q170 248 185 247 Q192 246 196 245" stroke="#c9b88c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="155" cy="256" r="5" fill="#c9b88c" opacity="0.8"/>
  <!-- Right hand -->
  <path d="M245 253 Q230 247 215 246 Q208 245 204 245" stroke="#c9b88c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="245" cy="254" r="5" fill="#c9b88c" opacity="0.8"/>
  <!-- Earth mound -->
  <ellipse cx="200" cy="248" rx="25" ry="8" fill="#5a4a38" opacity="0.5"/>
  <ellipse cx="200" cy="246" rx="18" ry="5" fill="#6b5744" opacity="0.4"/>
  <!-- Small seedlings around -->
  <line x1="140" y1="250" x2="140" y2="240" stroke="#5aa035" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="140" cy="238" r="3" fill="#4a8c2a" opacity="0.5"/>
  <line x1="260" y1="248" x2="260" y2="238" stroke="#5aa035" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="260" cy="236" r="3" fill="#4a8c2a" opacity="0.5"/>
  <line x1="160" y1="258" x2="160" y2="250" stroke="#5aa035" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="160" cy="249" r="2.5" fill="#4a8c2a" opacity="0.4"/>
  <line x1="240" y1="256" x2="240" y2="248" stroke="#5aa035" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="240" cy="247" r="2.5" fill="#4a8c2a" opacity="0.4"/>
  <!-- Birds -->
  <path d="M100 80 Q105 75 110 80" stroke="#2d4a20" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M115 70 Q120 65 125 70" stroke="#2d4a20" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M300 90 Q305 85 310 90" stroke="#2d4a20" stroke-width="1.5" fill="none" stroke-linecap="round"/>
