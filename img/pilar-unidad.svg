<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7c4a"/>
      <stop offset="100%" stop-color="#3d5c2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#sky2)"/>
  <!-- Rolling hills -->
  <path d="M0 200 Q80 170 160 190 Q240 160 320 180 Q370 170 400 185 L400 300 L0 300Z" fill="#4a6b38"/>
  <path d="M0 230 Q100 220 200 225 Q300 230 400 220 L400 300 L0 300Z" fill="#3d5c2e"/>
  <!-- Large oak tree -->
  <rect x="185" y="155" width="30" height="60" rx="5" fill="#5a4a38"/>
  <circle cx="200" cy="130" r="45" fill="#2d5020"/>
  <circle cx="175" cy="140" r="30" fill="#2d4a1e"/>
  <circle cx="228" cy="138" r="32" fill="#346028"/>
  <circle cx="200" cy="115" r="28" fill="#3a6830"/>
  <!-- People in a circle around the tree (simple, stylized) -->
  <!-- Person 1 (left) -->
  <circle cx="120" cy="210" r="8" fill="#c9b88c"/>
  <path d="M112 220 Q112 240 120 250" stroke="#4a3728" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M120 230 L130 225" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Person 2 -->
  <circle cx="145" cy="218" r="8" fill="#c9b88c"/>
  <path d="M137 228 Q137 248 145 255" stroke="#6b5744" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M145 238 L155 233" stroke="#6b5744" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Person 3 -->
  <circle cx="170" cy="225" r="8" fill="#c9b88c"/>
  <path d="M162 235 Q162 255 170 262" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Person 4 (right of tree) -->
  <circle cx="235" cy="224" r="8" fill="#c9b88c"/>
  <path d="M243 234 Q243 254 235 261" stroke="#4a3728" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M235 238 L225 233" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Person 5 -->
  <circle cx="260" cy="216" r="8" fill="#c9b88c"/>
  <path d="M268 226 Q268 246 260 253" stroke="#6b5744" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M260 236 L250 231" stroke="#6b5744" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Person 6 -->
  <circle cx="283" cy="208" r="8" fill="#c9b88c"/>
  <path d="M291 218 Q291 238 283 245" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Person in front center -->
  <circle cx="200" cy="238" r="9" fill="#c9b88c"/>
  <path d="M192 248 Q192 268 200 275" stroke="#4a3728" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M200 258 L190 253" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M200 258 L210 253" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Connecting hands suggestion (arcs between people) -->
  <path d="M128 225 Q137 222 137 228" stroke="#c9b88c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M153 233 Q162 228 162 235" stroke="#c9b88c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M253 231 Q258 226 260 236" stroke="#c9b88c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Stars/fireflies -->
  <circle cx="90" cy="130" r="1.5" fill="#f5d078" opacity="0.6"/>
  <circle cx="310" cy="120" r="1.5" fill="#f5d078" opacity="0.5"/>
  <circle cx="340" cy="145" r="1" fill="#f5d078" opacity="0.4"/>
  <circle cx="70" cy="155" r="1" fill="#f5d078" opacity="0.4"/>
</svg>
